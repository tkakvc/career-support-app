services:

  db:
    image: postgres:16
    container_name: career-postgres
    environment:
      POSTGRES_DB: career_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: career-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/career_app
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      APP_JWT_SECRET: dev-secret-key-for-local-development-only
      OPENAI_API_KEY: dummy-key-for-local
    depends_on:
      - db
