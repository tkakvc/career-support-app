spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/career_app
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration: 3600
  cors:
    allowed-origins: http://localhost:3000

storage:
  type: local
  local:
    base-path: uploads
