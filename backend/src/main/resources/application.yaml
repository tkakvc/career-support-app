spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/career_app
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration: 3600
  cors:
    allowed-origins: http://localhost:3000

storage:
  type: local
  local:
    base-path: uploads


# APIキーが漏れるリスクがあるため。WARN にするとエラー・警告だけ出て通信内容は出なくなる。
# [] で囲む理由：ドット（.）を含む文字列は YAML で誤解されることがあるため、文字列だと明示する。
logging:
  level:
    # org.springframework.ai = Spring AI のコードが入っているパッケージ（Javaのフォルダの階層）
    # この1行で「Spring AI 関連のコード全部のログを WARN 以上だけ出す」という設定になる
    "[org.springframework.ai]": WARN
