name: CI

on:
  push:
    branches:
      - '**'        # study/feature どのブランチへのpushでも実行
  workflow_dispatch:  # 手動実行ボタンも使えるようにする

jobs:
  # ─────────────────────────────
  # JOB 1: バックエンドのテスト（Spring Boot / Gradle）
  # ─────────────────────────────
  test-backend:
    runs-on: ubuntu-latest    # GitHubのサーバー（Ubuntu）で実行
    steps:
      - uses: actions/checkout@v4   # リポジトリをサーバーにcheckout

      - name: JDK 21 をセットアップ
        # backend/build.gradle の toolchain.languageVersion を見て確認した実際の値
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'          # ビルドキャッシュを効かせて2回目以降を速くする

      - name: テスト実行
        # このプロジェクトは Maven ではなく Gradle。./mvnw ではなく ./gradlew を使う
        # gradlew（Gradle Wrapper）＝ Gradle本体をインストールしなくても
        # リポジトリに入っているこのスクリプト経由で決まったバージョンのGradleが実行できる仕組み
        run: ./gradlew test
        working-directory: ./backend

  # ─────────────────────────────
  # JOB 2: フロントエンドの Lint・ビルド確認（Next.js）
  # ─────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 依存パッケージをインストール
        run: npm ci
        working-directory: ./frontend

      - name: Lintチェック
        run: npm run lint
        working-directory: ./frontend

      - name: ビルド確認（型エラー・ビルドエラーの検出）
        run: npm run build
        working-directory: ./frontend
        # 注：現時点では frontend/package.json に test スクリプトが無い
        # （Jest/Vitestなどのテストランナー未導入）ため、Lint + ビルド成功のみを
        # 「壊れていないことの確認」として使っている。テスト導入後はここに追加する。
